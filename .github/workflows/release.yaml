name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        run: |
          PLUGIN="datashield-blocklist"
          for TARGET in linux/amd64 linux/386 linux/arm linux/arm64 linux/mipsle linux/riscv64 windows/amd64; do
            GOOS="${TARGET%/*}"
            GOARCH="${TARGET#*/}"
            OUTPUT="${PLUGIN}_${GOOS}_${GOARCH}"
            if [ "$GOOS" = "windows" ]; then OUTPUT="${OUTPUT}.exe"; fi
            GOOS=$GOOS GOARCH=$GOARCH go build -trimpath -ldflags="-s -w" -o "$OUTPUT" .
            echo "Built $OUTPUT"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: datashield-blocklist_*
